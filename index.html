<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>광주화정유소년야구단 — 함평천지한우배 대시보드</title>
<style>
  :root{
    /* 흙 계열 (배경, 홈플레이트) */
    --dirt:#c9895a;
    --dirt-deep:#a86d3f;
    --dirt-light:#dba57a;
    --dirt-shadow:#8a5731;
    /* 잔디 계열 (카드) */
    --grass:#3a6b3f;
    --grass-deep:#264a2b;
    --grass-light:#4d8353;
    --grass-hi:rgba(255,255,255,.08);
    /* 베이스/파울라인 (흰색) */
    --base:#fbfaf5;
    --cream:#f5efe0;
    --line:rgba(251,250,245,.28);
    /* 텍스트 */
    --ink:#fbfaf5;
    --ink-dark:#3a2515;
    --sub:#dfd5c2;
    --sub-dark:#6b4a2b;
    /* 부문 컬러 (잔디 위에서 잘 보이는 톤) */
    --u-yu:#8ed7ff;
    --u-kkum:#c6f0a8;
    --u-sae:#f5b7d8;
    --u-jr:#ffcc80;
    --red:#ff7a5c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color:var(--ink);
    max-width:520px;margin:0 auto;padding:16px 14px 60px;
    line-height:1.5;
    background:
      radial-gradient(ellipse at 50% -10%, var(--dirt-light) 0%, var(--dirt) 40%, var(--dirt-deep) 100%);
    background-attachment:fixed;
    min-height:100vh;
  }
  /* ---------- 헤더 (그라운드 미니 뷰) ---------- */
  .header{
    background:linear-gradient(160deg, var(--grass) 0%, var(--grass-deep) 100%);
    border:2px solid var(--base);
    border-radius:20px;
    padding:20px 18px;display:flex;gap:14px;align-items:center;
    position:relative;overflow:hidden;
    box-shadow:0 6px 20px rgba(58,37,21,.35), inset 0 0 40px rgba(0,0,0,.15);
  }
  /* 홈플레이트 형태의 데코 */
  .header::before{
    content:'';position:absolute;left:-28px;bottom:-28px;width:110px;height:110px;
    background:var(--dirt);border:2px solid var(--base);
    transform:rotate(45deg);opacity:.35;
  }
  .header::after{
    content:'';position:absolute;right:-40px;top:-40px;width:150px;height:150px;
    border:2px dashed rgba(251,250,245,.25);border-radius:50%;
  }
  .logo{flex-shrink:0;position:relative;z-index:1}
  .header h1{font-size:19px;font-weight:800;letter-spacing:-.3px;position:relative;z-index:1}
  .header p{font-size:12.5px;color:var(--sub);margin-top:3px;position:relative;z-index:1}
  .header .badge{
    display:inline-block;margin-top:7px;font-size:11px;font-weight:800;
    background:var(--base);color:var(--grass-deep);
    border-radius:20px;padding:4px 11px;position:relative;z-index:1;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  /* ---------- 통계 (베이스 모양) ---------- */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .stat{
    background:var(--base);color:var(--ink-dark);
    border-radius:14px;padding:12px 6px;text-align:center;
    box-shadow:0 3px 10px rgba(58,37,21,.25);
    position:relative;
  }
  .stat b{display:block;font-size:22px;color:var(--grass-deep);font-weight:900}
  .stat span{font-size:11px;color:var(--sub-dark);font-weight:600}
  /* ---------- 섹션 타이틀 ---------- */
  .section-title{
    font-size:15px;font-weight:800;margin:26px 4px 11px;
    display:flex;align-items:center;gap:6px;color:var(--ink);
    text-shadow:0 2px 4px rgba(58,37,21,.4);
  }
  .section-title small{font-weight:500;font-size:11px;color:var(--sub);text-shadow:none}
  /* ---------- 필터 칩 ---------- */
  .filter-row{display:flex;gap:5px}
  .chip{
    flex:1;min-width:0;text-align:center;font-size:12px;font-weight:800;
    padding:9px 0;border-radius:20px;white-space:nowrap;
    background:var(--grass-deep);border:1.5px solid var(--line);
    color:var(--sub);cursor:pointer;transition:all .15s;
  }
  .chip.on{
    background:var(--base);color:var(--grass-deep);
    border-color:var(--base);
    box-shadow:0 3px 10px rgba(58,37,21,.3);
  }
  @media (max-width:360px){ .chip{font-size:11px} }
  /* ---------- 날짜 헤더 (파울 라인 스타일) ---------- */
  .date-head{display:flex;align-items:center;gap:8px;margin:22px 2px 11px}
  .date-head .d{font-size:16px;font-weight:900;color:var(--ink);text-shadow:0 2px 4px rgba(58,37,21,.4)}
  .date-head .wx-inline{
    display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:800;
    background:var(--base);color:var(--grass-deep);
    border-radius:12px;padding:3px 9px;
    box-shadow:0 2px 6px rgba(58,37,21,.25);
  }
  .date-head .wx-inline .wr{color:var(--sub-dark);font-weight:600;margin-left:3px;font-size:11px}
  .date-head::after{content:'';flex:1;height:2px;background:repeating-linear-gradient(90deg,var(--base) 0 8px,transparent 8px 14px);opacity:.5}
  /* ---------- 경기 카드 (잔디 박스) ---------- */
  .game{
    background:linear-gradient(180deg,var(--grass) 0%,var(--grass-deep) 100%);
    border:2px solid var(--base);border-radius:16px;
    padding:15px 14px;margin-bottom:10px;cursor:pointer;
    transition:transform .1s,box-shadow .15s;
    box-shadow:0 4px 12px rgba(58,37,21,.28);
    position:relative;
  }
  .game:active{transform:scale(.985)}
  .game .match{
    display:flex;align-items:center;justify-content:center;gap:9px;
    font-size:18px;font-weight:900;letter-spacing:-.3px;white-space:nowrap;
    color:var(--ink);
  }
  .game .match .vs{font-size:12px;color:var(--sub);font-weight:700}
  .game .match .hw{color:var(--base);text-shadow:0 0 8px rgba(251,250,245,.4)}
  .game .meta{display:flex;flex-wrap:nowrap;justify-content:center;gap:5px;margin-top:11px;overflow:hidden}
  .tag{
    font-size:12px;font-weight:700;padding:5px 10px;border-radius:12px;
    background:rgba(38,74,43,.55);border:1px solid var(--line);
    color:var(--ink);white-space:nowrap;
  }
  .tag.time{background:var(--base);color:var(--grass-deep);border-color:var(--base);font-weight:800}
  .tag.cat-yu{color:var(--u-yu);border-color:rgba(142,215,255,.5)}
  .tag.cat-kkum{color:var(--u-kkum);border-color:rgba(198,240,168,.5)}
  .tag.cat-sae{color:var(--u-sae);border-color:rgba(245,183,216,.5)}
  .tag.cat-jr{color:var(--u-jr);border-color:rgba(255,204,128,.5)}
  .tag.warn{color:var(--red);border-color:rgba(255,122,92,.4)}
  .game.tbd{border-style:dashed;opacity:.88}
  .game.tbd .match{font-size:16px;color:var(--sub)}
  @media (max-width:360px){
    .tag{font-size:11px;padding:4px 8px}
    .game .match{font-size:16px}
    .game .match .vs{font-size:11px}
  }
  /* ---------- 겹침 안내 ---------- */
  .notice{
    background:rgba(255,122,92,.14);border:1.5px solid rgba(255,122,92,.5);
    border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--ink);margin-top:14px;
    box-shadow:0 3px 10px rgba(58,37,21,.2);
  }
  .notice b{color:var(--red)}
  /* ---------- 구장 카드 (전체 클릭 가능) ---------- */
  .venue{
    display:block;
    background:linear-gradient(180deg,var(--grass) 0%,var(--grass-deep) 100%);
    border:2px solid var(--base);border-radius:16px;
    padding:14px 16px;margin-bottom:10px;
    text-decoration:none;color:inherit;
    box-shadow:0 4px 12px rgba(58,37,21,.28);
    transition:transform .1s;position:relative;
    cursor:pointer;
  }
  .venue:active{transform:scale(.985)}
  .venue .v-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .venue .v-name{font-size:15.5px;font-weight:900;color:var(--ink);letter-spacing:-.3px}
  .venue .v-map{
    flex-shrink:0;display:inline-flex;align-items:center;gap:4px;
    font-size:12px;font-weight:800;padding:7px 12px;border-radius:20px;
    background:var(--base);color:var(--grass-deep);
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .venue .v-sub{font-size:11.5px;color:var(--sub);margin-top:5px;font-weight:600}
  /* ---------- 팝업 ---------- */
  .overlay{position:fixed;inset:0;background:rgba(58,37,21,.65);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:520px;margin:0 auto;
    background:linear-gradient(180deg,var(--grass) 0%,var(--grass-deep) 100%);
    border:2px solid var(--base);border-bottom:none;
    border-radius:22px 22px 0 0;padding:10px 20px 34px;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,.3,1);
    max-height:82vh;overflow-y:auto;
  }
  .sheet.show{transform:translateY(0)}
  .grip{width:42px;height:4px;border-radius:4px;background:var(--base);opacity:.7;margin:6px auto 16px}
  .sheet .s-cat{font-size:12px;font-weight:800;margin-bottom:6px}
  .sheet .s-match{font-size:22px;font-weight:900;text-align:center;margin:8px 0 4px;letter-spacing:-.4px;color:var(--ink)}
  .sheet .s-match .hw{color:var(--base);text-shadow:0 0 10px rgba(251,250,245,.5)}
  .sheet .s-vs{text-align:center;font-size:11px;color:var(--sub);margin-bottom:16px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .info{background:var(--base);color:var(--ink-dark);border-radius:12px;padding:11px 13px}
  .info .k{font-size:10.5px;color:var(--sub-dark);font-weight:700}
  .info .v{font-size:13.5px;font-weight:800;margin-top:2px;color:var(--grass-deep)}
  .info.wide{grid-column:1/-1}
  .s-note{
    margin-top:14px;font-size:12px;color:var(--sub);
    background:rgba(38,74,43,.5);border:1.5px dashed var(--line);border-radius:12px;padding:11px 13px;
  }
  .footer{text-align:center;font-size:10.5px;color:var(--sub-dark);margin-top:34px;font-weight:600}
</style>
</head>

  const real = GAMES.filter(g=>!g.tbd);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><b>${real.length}</b><span>예선 경기</span></div>
    <div class="stat"><b>4</b><span>출전 부문</span></div>
    <div class="stat"><b>3</b><span>대회 일수</span></div>`;
})();

/* ================= 필터 ================= */
let curFilter = '전체';
const filterRow = document.getElementById('filterRow');
['전체','유소년','꿈나무','새싹','주니어'].forEach(f=>{
  const c = document.createElement('div');
  c.className = 'chip' + (f===curFilter?' on':'');
  c.textContent = f==='전체' ? '전체' : `${CATS[f].icon} ${f}`;
  c.onclick = ()=>{ curFilter=f;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); render(); };
  filterRow.appendChild(c);
});

/* ================= 렌더 ================= */
function hwSide(g){
  if(g.tbd) return null;
  return g.right==='화정' ? 'home' : (g.left==='화정' ? 'away' : null);
}
function matchHTML(g, big){
  if(g.final) return `🏅 결승전`;
  const l = g.left==='화정' ? `<span class="hw">화정</span>` : g.left;
  const r = g.right==='화정' ? `<span class="hw">화정</span>` : g.right;
  return `${l} <span class="vs">vs</span> ${r}`;
}
function render(){
  const list = document.getElementById('gameList');
  const games = GAMES.filter(g=>curFilter==='전체'||g.cat===curFilter);
  const byDate = {};
  games.forEach(g=>{ (byDate[g.date]=byDate[g.date]||[]).push(g); });
  Object.values(byDate).forEach(a=>a.sort((x,y)=>x.min-y.min));

  const DOW = {'8/15':'토요일','8/16':'일요일','8/17':'월요일 · 본선'};
  const DATE_KEY = {'8/15':'2026-08-15','8/16':'2026-08-16','8/17':'2026-08-17'};
  let html = '';
  ['8/15','8/16','8/17'].forEach(d=>{
    if(!byDate[d]) return;
    html += `<div class="date-head"><span class="d">📅 ${d} ${DOW[d]}</span><span class="wx-inline" id="wx-${d.replace('/','-')}">☁️ 예보 준비중</span></div>`;
    byDate[d].forEach(g=>{
      const cat = CATS[g.cat];
      html += `<div class="game${g.tbd?' tbd':''}" onclick="openSheet(${g.id})">
        <div class="match">${matchHTML(g)}</div>
        <div class="meta">
          <span class="tag ${cat.cls}">${cat.icon} ${g.cat}</span>
          <span class="tag time">🕐 ${g.time}</span>
          <span class="tag">🏟️ ${g.venue}</span>
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}
render();

/* ================= 구장 ================= */
(function(){
  document.getElementById('venueList').innerHTML = VENUES.map(v=>{

/* ================= 팝업 ================= */
function openSheet(id){
  const g = GAMES.find(x=>x.id===id);
  const cat = CATS[g.cat];
  const catColor = {'유소년':'var(--u-yu)','꿈나무':'var(--u-kkum)','새싹':'var(--u-sae)','주니어':'var(--u-jr)'}[g.cat];
  document.getElementById('sheetBody').innerHTML = `
    <div class="s-cat" style="color:${catColor}">${cat.icon} ${g.cat}부</div>
    <div class="s-match">${matchHTML(g)}</div>
    <div class="s-vs">${g.tbd ? '⏳ 대진은 예선 결과에 따라 확정' : ''}</div>
    <div class="info-grid">
      <div class="info"><div class="k">날짜</div><div class="v">${g.date} (${g.dow})</div></div>
      <div class="info"><div class="k">시간</div><div class="v">${g.time}</div></div>
      <div class="info wide"><div class="k">구장</div><div class="v">🏟️ ${g.venue}</div></div>
    </div>
    ${g.tbd
      ? `<div class="s-note">본선 시간·구장은 확정되어 있습니다. 화정의 진출 여부와 대진은 예선 조별 순위에 따라 결정되며, 확정되는 대로 업데이트하겠습니다.</div>`
      : `<div class="s-note">라인업 정보는 감독님 확정 후 추가 예정입니다.</div>`}`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

/* ================= 날씨 (Open-Meteo) — 날짜 헤더 인라인 ================= */
(async function(){
  const days = [
    {d:'2026-08-15', key:'8-15'},
    {d:'2026-08-16', key:'8-16'},
    {d:'2026-08-17', key:'8-17'},
  ];
  const ICON = c=>{
    if(c===0) return '☀️';
    if(c<=2) return '🌤️';
    if(c===3) return '☁️';
    if(c<=48) return '🌫️';
    if(c<=67) return '🌧️';
    if(c<=77) return '🌨️';
    if(c<=82) return '🌦️';
    return '⛈️';
  };
  const setEl = (key, html) => {
    const el = document.getElementById('wx-'+key);
    if(el) el.innerHTML = html;
  };
  try{
    const base = 'https://api.open-meteo.com/v1/forecast?latitude=35.0659&longitude=126.5169&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=16';
    let res = await fetch(base);
    let j = await res.json();
    let codes = j?.daily?.weather_code;
    if(!codes){
      res = await fetch(base.replace('weather_code','weathercode'));
      j = await res.json();
      codes = j?.daily?.weathercode;
    }
    if(!j?.daily?.time){
      days.forEach(x=>setEl(x.key, '📅 예보 준비중'));
      return;
    }
    days.forEach(x=>{
      const i = j.daily.time.indexOf(x.d);
      if(i<0){
        setEl(x.key, '📅 예보 대기중');
      }else{
        const lo = Math.round(j.daily.temperature_2m_min[i]);
        const hi = Math.round(j.daily.temperature_2m_max[i]);
        const rain = j.daily.precipitation_probability_max[i] ?? '-';
        setEl(x.key, `${ICON(codes[i])} ${lo}°/${hi}° <span class="wr">💧${rain}%</span>`);
      }
    });
  }catch(e){
    days.forEach(x=>setEl(x.key, '📅 예보 준비중'));
  }
})();
</script>
