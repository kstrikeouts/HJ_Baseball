<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광주화정유소년야구단 - 2026 공산성배 대회 대시보드</title>
<style>
  :root{--gd:#1a4d2e;--gm:#2e7d32;--gl:#e8f5e9;--gb:#a5d6a7;--yw:#f5c518;--fg:#2d5a1b;--bg:#fff;--bg2:#f8f9fa;--tx:#1a1a1a;--t2:#6b7280;--br:#e5e7eb;--b2:#d1d5db;--rs:6px;--rm:10px;--rl:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg2);color:var(--tx);min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;padding:1rem;}

  /* 헤더 */
  .hdr{background:var(--gd);border-radius:var(--rl);padding:1.1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(26,77,46,.35);}
  .logo-wrap{flex-shrink:0;}
  .logo-svg{width:56px;height:56px;}
  .hdr h1{font-size:18px;font-weight:700;color:#e8f5e9;margin-bottom:3px;}
  .hdr p{font-size:12px;color:#a5d6a7;}

  /* 스탯 */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
  .stat{background:var(--bg);border-radius:var(--rm);padding:.8rem .5rem;text-align:center;border:.5px solid var(--br);}
  .stat .n{font-size:22px;font-weight:700;color:var(--gm);}
  .stat .l{font-size:11px;color:var(--t2);margin-top:2px;}

  /* 섹션 */
  .sec{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.06em;}
  .sec::before{content:'';width:3px;height:13px;background:var(--gm);border-radius:2px;}

  /* 경기장 카드 */
  .vrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
  .vcard{background:var(--bg);border:.5px solid var(--br);border-radius:var(--rl);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s,box-shadow .15s;}
  .vcard:hover{border-color:var(--gm);box-shadow:0 2px 8px rgba(46,125,50,.15);}
  .vc-name{font-size:13px;font-weight:600;color:var(--tx);}
  .vc-addr{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.4;}
  .vc-link{font-size:11px;color:var(--gm);margin-top:4px;font-weight:500;}

  /* 필터 */
  .filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
  .fbtn{padding:5px 14px;border-radius:999px;font-size:13px;cursor:pointer;border:.5px solid var(--b2);background:var(--bg);color:var(--t2);font-weight:500;}
  .fbtn.on{background:var(--gd);color:#e8f5e9;border-color:var(--gd);}

  /* 경기 카드 */
  .dlbl{font-size:12px;font-weight:600;color:#1b5e20;background:var(--gl);border-radius:var(--rs);padding:4px 12px;display:inline-block;margin-bottom:8px;border:.5px solid var(--gb);}
  .gcards{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
  .gcard{background:var(--bg);border:.5px solid var(--br);border-radius:var(--rl);padding:.85rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .gcard:hover{border-color:var(--gm);box-shadow:0 2px 8px rgba(46,125,50,.1);}
  .tbadge{min-width:64px;text-align:center;background:var(--gl);border-radius:var(--rs);padding:5px 6px;border:.5px solid var(--gb);flex-shrink:0;}
  .tbadge span{font-size:11px;font-weight:600;color:#1b5e20;line-height:1.4;display:block;}
  .ginfo{flex:1;min-width:0;}
  .gm{font-size:14px;font-weight:600;color:var(--tx);}
  .vlink{font-size:12px;color:var(--gm);margin-top:3px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;text-decoration:none;font-weight:500;}
  .vlink:hover{text-decoration:underline;}
  .wx{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;background:#f0f9ff;border:.5px solid #bae6fd;border-radius:var(--rs);padding:3px 8px;color:#0369a1;white-space:nowrap;flex-shrink:0;}
  .wx.rain{background:#fef3c7;border-color:#fcd34d;color:#92400e;}
  .wx.cloud{background:#f3f4f6;border-color:var(--b2);color:#374151;}
  .wx.load{background:#f9fafb;border-color:var(--br);color:#9ca3af;}
  .brow{display:flex;gap:5px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
  .cb{padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;}
  .c유소년{background:#e3f2fd;color:#0d47a1;border:.5px solid #90caf9;}
  .c꿈나무{background:#fff8e1;color:#e65100;border:.5px solid #ffcc02;}
  .c새싹{background:#e8f5e9;color:#1b5e20;border:.5px solid #81c784;}
  .sb{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:500;}
  .home{background:#e8f5e9;color:#2e7d32;border:.5px solid #81c784;}
  .away{background:#fce4ec;color:#880e4f;border:.5px solid #f48fb1;}

  /* 경기 팝업 */
  .gov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:800;align-items:flex-end;justify-content:center;}
  .gov.open{display:flex;}
  .gpop{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 32px rgba(0,0,0,.25);animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .gph{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem .85rem;border-bottom:.5px solid var(--br);position:sticky;top:0;background:var(--bg);z-index:1;}
  .gph h3{font-size:14px;font-weight:700;color:var(--tx);}
  .xbtn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--t2);}
  .xbtn:hover{background:var(--br);}
  .gpb{padding:1rem 1.25rem 1.5rem;}
  .vsbox{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f1f8e9;border-radius:var(--rm);border:.5px solid var(--gb);margin-bottom:12px;}
  .vst{flex:1;text-align:center;}
  .vn{font-size:15px;font-weight:700;color:#1b5e20;}
  .vn.hw{color:#1565c0;}
  .vr{font-size:11px;color:#388e3c;margin-top:2px;}
  .vsep{font-size:18px;font-weight:700;color:#81c784;}
  .meta{font-size:12px;color:var(--t2);margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .mlink{color:var(--gm);text-decoration:underline;cursor:pointer;font-weight:500;}

  /* 야구장 */
  .field{background:var(--fg);border-radius:var(--rl);padding:1rem .5rem;box-shadow:inset 0 2px 8px rgba(0,0,0,.2);}
  .ftitle{font-size:11px;color:#a5d6a7;text-align:center;margin-bottom:8px;}
  .diamond{position:relative;width:100%;max-width:380px;height:340px;margin:0 auto;}
  .diamond svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .pnode{position:absolute;transform:translate(-50%,-50%);background:#f5f5dc;border:1.5px solid #8B6914;border-radius:var(--rs);padding:4px 8px;min-width:62px;text-align:center;cursor:pointer;transition:transform .12s;z-index:2;}
  .pnode:hover{transform:translate(-50%,-50%) scale(1.1);background:#fffde7;box-shadow:0 2px 8px rgba(0,0,0,.25);}
  .pnode.pitcher{background:#fff9c4;border-color:#f9a825;}
  .pnode.catcher{background:#e3f2fd;border-color:#1565c0;}
  .pname{font-size:12px;font-weight:600;color:#1a1a1a;}
  .ppos{font-size:9px;color:#666;margin-top:1px;}

  /* 선수 팝업 */
  .plov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1100;align-items:center;justify-content:center;padding:1rem;}
  .plov.open{display:flex;}
  .plpop{background:var(--bg);border-radius:var(--rl);padding:1.25rem;width:260px;box-shadow:0 8px 40px rgba(0,0,0,.35);}
  .mhd{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .mav{width:48px;height:48px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1b5e20;flex-shrink:0;border:2px solid var(--gb);}
  .mname{font-size:16px;font-weight:700;color:var(--tx);}
  .mnum{font-size:13px;color:var(--t2);margin-top:2px;}
  .mrows{border-top:.5px solid var(--br);padding-top:10px;}
  .mrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--br);font-size:13px;}
  .mrow:last-child{border-bottom:none;}
  .ml{color:var(--t2);} .mv{color:var(--tx);font-weight:600;}
  .mcls{display:block;width:100%;margin-top:14px;padding:9px;text-align:center;cursor:pointer;background:var(--gd);color:#e8f5e9;border-radius:var(--rm);border:none;font-size:13px;font-weight:600;}

  /* 경기장 팝업 */
  .vpov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem;}
  .vpov.open{display:flex;}
  .vppop{background:var(--bg);border-radius:var(--rl);padding:1.25rem;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.25);}
  .vptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
  .vptag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--gl);color:#1b5e20;border:.5px solid var(--gb);}
  .nbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:var(--rm);background:#03C75A;color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;text-decoration:none;}
  .nbtn:hover{background:#02b350;}

  @media(max-width:400px){.stats{grid-template-columns:repeat(2,1fr);}.vrow{grid-template-columns:1fr;}}
</style>
</head>

};

let filt='전체', wxCache={};

// Open-Meteo API — 공주시 좌표 (forecast_days로 16일 예보, 오늘~6/21 커버)
async function fetchWeather(){
  // weather_code (언더스코어) = Open-Meteo 최신 표준 파라미터명
  const lat=36.4468, lon=127.1191;
  const base=`latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weather_code&timezone=Asia%2FSeoul`;

  // 1차: forecast_days 방식 (오늘~16일 이내일 때 작동)
  // 2차: start_date/end_date 방식 (백업)
  const urls=[
    `https://api.open-meteo.com/v1/forecast?${base}&forecast_days=16`,
    `https://api.open-meteo.com/v1/forecast?${base}&start_date=2026-06-20&end_date=2026-06-21`,
  ];

  for(const url of urls){
    try{
      const r=await fetch(url);
      if(!r.ok) continue;
      const d=await r.json();
      if(!d.hourly||!d.hourly.time) continue;
      const times=d.hourly.time;
      const temps=d.hourly.temperature_2m;
      // weather_code 또는 weathercode 둘 다 대응
      const codes=d.hourly.weather_code||d.hourly.weathercode;
      if(!codes) continue;

      let matched=0;
      GAMES.forEach(g=>{
        const ds=g.date==='6/20'?'2026-06-20':'2026-06-21';
        const key=`${ds}T${String(g.hour).padStart(2,'0')}:00`;
        const idx=times.indexOf(key);
        if(idx>=0){ wxCache[g.id]={code:codes[idx],temp:Math.round(temps[idx])}; matched++; }
      });

      if(matched>0){ applyWx(); return; } // 성공
    }catch(e){ console.warn('날씨 시도 실패:',url,e.message); }
  }

  // 모든 시도 실패 → 안내 표시
  GAMES.forEach(g=>{
    const el=document.getElementById('wx'+g.id);
    if(el){ el.className='wx cloud'; el.textContent='날씨 준비중'; }
  });
}

function wxInfo(code,temp){
  if(code<=1) return{icon:'☀️',label:`맑음 ${temp}°`,cls:''};
  if(code<=3) return{icon:'⛅',label:`구름 ${temp}°`,cls:'cloud'};
  if(code<=48)return{icon:'🌫️',label:`안개 ${temp}°`,cls:'cloud'};
  if(code<=67)return{icon:'🌧️',label:`비 ${temp}°`,cls:'rain'};
  if(code<=77)return{icon:'❄️',label:`눈 ${temp}°`,cls:'cloud'};
  if(code<=82)return{icon:'🌦️',label:`소나기 ${temp}°`,cls:'rain'};
  return{icon:'⛈️',label:`뇌우 ${temp}°`,cls:'rain'};
}

function applyWx(){
  GAMES.forEach(g=>{
    const el=document.getElementById('wx'+g.id); if(!el)return;
    const w=wxCache[g.id]; if(!w)return;
    const{icon,label,cls}=wxInfo(w.code,w.temp);
    el.className='wx '+cls; el.textContent=`${icon} ${label}`;
  });
}

function dn(k){if(!k)return'';return k.replace('(54)',' #54').replace('(7)',' #7');}

function closeGame(e){if(e&&e.target!==document.getElementById('gov'))return;document.getElementById('gov').classList.remove('open');}
function closePl(){document.getElementById('plov').classList.remove('open');}
function closeVp(){document.getElementById('vpov').classList.remove('open');}

function openVp(name,e){
  if(e)e.stopPropagation();
  const v=VENUES[name];if(!v)return;
  document.getElementById('vpName').textContent=name;
  document.getElementById('vpAddr').textContent=v.addr;
  document.getElementById('vpGames').innerHTML=v.games.map(g=>`<span class="vptag">${g}</span>`).join('');
  document.getElementById('vpLink').href=v.url;
  document.getElementById('vpov').classList.add('open');
}

function showPl(key,pos){
  const p=ROSTER[key];if(!p)return;
  document.getElementById('mAv').textContent=key.slice(0,1);
  document.getElementById('mName').textContent=dn(key);
  document.getElementById('mNum').textContent=`#${p.num} · ${pos}`;
  document.getElementById('mRows').innerHTML=[
    {l:'등번호',v:`#${p.num}`},
    {l:'출신학교',v:p.school},
    {l:'생년월일',v:p.birth},
  ].map(r=>`<div class="mrow"><span class="ml">${r.l}</span><span class="mv">${r.v}</span></div>`).join('');
  document.getElementById('plov').classList.add('open');
}

function openGame(id){
  const g=GAMES.find(x=>x.id===id);if(!g)return;
  const lu=LINEUPS[g.id]||{};
  const vurl=VENUES[g.venue]?.url||'#';
  const nodes=POS.map(p=>{
    const key=lu[p.key]||'';
    return`<div class="pnode ${p.cls}" style="left:${p.x}%;top:${p.y}%" onclick="showPl('${key}','${p.label}')">
      <div class="pname">${dn(key)}</div><div class="ppos">${p.label}</div></div>`;
  }).join('');
  document.getElementById('gpTitle').textContent=`⚾ ${g.date}(${g.dow}) ${g.time} · ${g.cat}`;
  document.getElementById('gpBody').innerHTML=`
    <div class="vsbox">
      <div class="vst"><div class="vn ${g.left==='화정'?'hw':''}">${g.left}</div><div class="vr">${g.left==='화정'?'홈':'원정'}</div></div>
      <div class="vsep">:</div>
      <div class="vst"><div class="vn ${g.right==='화정'?'hw':''}">${g.right}</div><div class="vr">${g.right==='화정'?'홈':'원정'}</div></div>
    </div>
    <div class="meta">
      <a href="${vurl}" target="_blank" class="mlink" onclick="event.stopPropagation()">📍 ${g.venue}</a>
      <span>·</span><span>화정 ${g.left==='화정'?'홈':'원정'}</span>
    </div>
    <div class="field">
      <div class="ftitle">수비 라인업 — 선수 이름을 클릭하면 상세 정보를 볼 수 있습니다</div>
      <div class="diamond">
        <svg viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
          <line x1="53" y1="75" x2="190" y2="296" stroke="#7cb87c" stroke-width="1" opacity=".5"/>
          <line x1="327" y1="75" x2="190" y2="296" stroke="#7cb87c" stroke-width="1" opacity=".5"/>
          <path d="M53 75 Q190 10 327 75" fill="none" stroke="#7cb87c" stroke-width="1" opacity=".35"/>
          <polygon points="190,150 120,210 190,265 260,210" fill="rgba(180,140,60,.13)" stroke="#c8a84b" stroke-width="1.5"/>
        </svg>
        ${nodes}
      </div>
    </div>`;
  document.getElementById('gov').classList.add('open');
}

function renderStats(){
  document.getElementById('stats').innerHTML=[
    {n:GAMES.length,l:'총 경기 수'},{n:2,l:'경기 일수'},{n:3,l:'참가 부문'},{n:2,l:'경기장 수'}
  ].map(s=>`<div class="stat"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');
}

function renderVenues(){
  document.getElementById('venues').innerHTML=Object.entries(VENUES).map(([name,v])=>`
    <div class="vcard" onclick="openVp('${name}',event)">
      <span style="font-size:22px">🏟️</span>
      <div><div class="vc-name">${name}</div><div class="vc-addr">${v.addr}</div><div class="vc-link">📍 지도 보기</div></div>
    </div>`).join('');
}

function renderFilters(){
  document.getElementById('filters').innerHTML=['전체','유소년','꿈나무','새싹'].map(f=>
    `<button class="fbtn ${filt===f?'on':''}" onclick="setFilt('${f}')">${f}</button>`).join('');
}
function setFilt(f){filt=f;renderFilters();renderGames();}

function renderGames(){
  const games=filt==='전체'?GAMES:GAMES.filter(g=>g.cat===filt);
  const byDate={};
  games.forEach(g=>{if(!byDate[g.date])byDate[g.date]=[];byDate[g.date].push(g);});
  document.getElementById('glist').innerHTML=Object.entries(byDate).map(([date,gs])=>`
    <div class="dlbl">📅 ${date}(${gs[0].dow}요일)</div>
    <div class="gcards">${gs.map(g=>{
      const isH=g.left==='화정';
      const vurl=VENUES[g.venue]?.url||'#';
      return`<div class="gcard" onclick="openGame(${g.id})">
        <div class="tbadge"><span>${g.time.replace('~','~\n')}</span></div>
        <div class="ginfo">
          <div class="gm">${g.left} : ${g.right}</div>
          <a class="vlink" href="${vurl}" target="_blank" onclick="event.stopPropagation()">📍 ${g.venue}</a>
        </div>
        <div class="brow">
          <span id="wx${g.id}" class="wx load">⏳</span>
          <span class="sb ${g.left==='화정'?'home':'away'}">${g.left==='화정'?'홈':'원정'}</span>
          <span class="cb c${g.cat}">${g.cat}</span>
        </div>
      </div>`;
    }).join('')}</div>`).join('');
  applyWx();
}

renderStats(); renderVenues(); renderFilters(); renderGames(); fetchWeather();
